services:
  postgres:
    image: postgres:16.3
    ports:
      - "5432:5432"
    container_name: mula_db
    restart: always
    
    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Genexis -d MulaDB"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: