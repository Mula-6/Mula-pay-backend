services:
  postgres:
    image: postgres:16.3
    ports:
      - "5432:5432"
    container_name: mula_db
    restart: always
    
    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Genexis -d MulaDB"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: redis_temple
    image: redis/redis-stack:7.2.0-v8
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      - REDIS_ARGS=--appendonly yes --protected-mode no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    

volumes:
  postgres_data:
  redis_data: